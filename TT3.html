<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Timetable Manager</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f3f4f6;
            --surface: #ffffff;
            --border: #e5e7eb;
            --text: #1f2937;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        select, button, input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        .secondary-btn {
            background-color: #10b981;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 15px;
            text-align: center;
            min-width: 120px;
        }
        th {
            background-color: #f9fafb;
            font-weight: 600;
        }
        td {
            cursor: pointer;
            transition: background-color 0.2s;
        }
        td:hover {
            background-color: #f0fdf4;
        }
        .cell-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .subject { font-weight: bold; color: var(--primary); }
        .faculty { font-size: 0.85em; color: #6b7280; }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .modal-content input { width: 90%; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .close-btn { background-color: #ef4444; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Timetable Manager</h2>
        <div class="controls">
            <button class="secondary-btn" onclick="document.getElementById('fileInput').click()">📁 Load File</button>
            <input type="file" id="fileInput" style="display: none" accept=".json" onchange="loadFile(event)">
            <button class="secondary-btn" onclick="saveFile()">💾 Save to File</button>
            <button onclick="window.print()">🖨️ Print</button>
        </div>
    </header>

    <div class="controls">
        <label>Department:
            <select id="department" onchange="renderTable()">
                <option value="Computer Science">Computer Science</option>
                <option value="Mechanical">Mechanical</option>
                <option value="Electrical">Electrical</option>
                <option value="Civil">Civil</option>
            </select>
        </label>
        
        <label>Semester:
            <select id="semester" onchange="renderTable()">
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
            </select>
        </label>

        <button onclick="addTimeSlot()">+ Add Time Slot</button>
    </div>

    <table id="timetable">
        <thead>
            <tr id="header-row">
                <th>Day / Time</th>
                </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h3>Edit Lecture</h3>
        <input type="text" id="subjectInput" placeholder="Subject Name (e.g., Database)">
        <input type="text" id="facultyInput" placeholder="Faculty Name (e.g., Dr. Smith)">
        <div class="modal-actions">
            <button class="close-btn" onclick="clearCell()">Clear Cell</button>
            <button class="close-btn" onclick="closeModal()">Cancel</button>
            <button onclick="saveCell()">Save</button>
        </div>
    </div>
</div>

<script>
    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    
    // Main data structure
    let appData = {};
    let currentEditParams = null; // Stores { day, slotIndex }

    function getCurrentKey() {
        const dept = document.getElementById('department').value;
        const sem = document.getElementById('semester').value;
        return `${dept}_Sem${sem}`;
    }

    function initDataIfMissing(key) {
        if (!appData[key]) {
            appData[key] = {
                timeSlots: ["09:00 AM - 10:00 AM", "10:00 AM - 11:00 AM"],
                schedule: {}
            };
            days.forEach(day => {
                appData[key].schedule[day] = {};
            });
        }
    }

    function renderTable() {
        const key = getCurrentKey();
        initDataIfMissing(key);
        const data = appData[key];

        // Render Header
        const headerRow = document.getElementById('header-row');
        headerRow.innerHTML = '<th>Day / Time</th>';
        data.timeSlots.forEach((slot, index) => {
            const th = document.createElement('th');
            th.innerText = slot;
            // Double click to remove time slot
            th.ondblclick = () => removeTimeSlot(index);
            th.title = "Double click to remove this time slot";
            headerRow.appendChild(th);
        });

        // Render Body
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        
        days.forEach(day => {
            const tr = document.createElement('tr');
            
            const dayCell = document.createElement('td');
            dayCell.style.fontWeight = "bold";
            dayCell.innerText = day;
            tr.appendChild(dayCell);

            data.timeSlots.forEach((slot, index) => {
                const td = document.createElement('td');
                const cellData = data.schedule[day][index];
                
                if (cellData && cellData.subject) {
                    td.innerHTML = `
                        <div class="cell-content">
                            <span class="subject">${cellData.subject}</span>
                            <span class="faculty">${cellData.faculty}</span>
                        </div>
                    `;
                } else {
                    td.innerHTML = `<span style="color:#ccc; font-size: 0.8em">+ Add</span>`;
                }
                
                td.onclick = () => openModal(day, index);
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    }

    function addTimeSlot() {
        const newSlot = prompt("Enter new time slot (e.g., 11:00 AM - 12:00 PM):");
        if (newSlot && newSlot.trim() !== "") {
            const key = getCurrentKey();
            appData[key].timeSlots.push(newSlot);
            renderTable();
        }
    }

    function removeTimeSlot(index) {
        if (confirm("Are you sure you want to delete this time slot? It will delete all lectures in this column.")) {
            const key = getCurrentKey();
            appData[key].timeSlots.splice(index, 1);
            
            // Re-index the schedule to avoid data corruption
            days.forEach(day => {
                const newDaySchedule = {};
                let newIndex = 0;
                for (let i = 0; i <= appData[key].timeSlots.length; i++) {
                    if (i !== index && appData[key].schedule[day][i]) {
                        newDaySchedule[newIndex] = appData[key].schedule[day][i];
                        newIndex++;
                    } else if (i !== index) {
                        newIndex++;
                    }
                }
                appData[key].schedule[day] = newDaySchedule;
            });
            renderTable();
        }
    }

    // Modal Logic
    function openModal(day, slotIndex) {
        currentEditParams = { day, slotIndex };
        const key = getCurrentKey();
        const cellData = appData[key].schedule[day][slotIndex] || { subject: "", faculty: "" };
        
        document.getElementById('subjectInput').value = cellData.subject;
        document.getElementById('facultyInput').value = cellData.faculty;
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
        currentEditParams = null;
    }

    function saveCell() {
        const subject = document.getElementById('subjectInput').value;
        const faculty = document.getElementById('facultyInput').value;
        const key = getCurrentKey();
        
        appData[key].schedule[currentEditParams.day][currentEditParams.slotIndex] = { subject, faculty };
        closeModal();
        renderTable();
    }

    function clearCell() {
        const key = getCurrentKey();
        delete appData[key].schedule[currentEditParams.day][currentEditParams.slotIndex];
        closeModal();
        renderTable();
    }

    // File Operations
    function saveFile() {
        const dataStr = JSON.stringify(appData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = "college_timetables.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function loadFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                appData = JSON.parse(e.target.result);
                renderTable();
                alert("Timetable data loaded successfully!");
            } catch (error) {
                alert("Error parsing file. Please ensure it is a valid JSON timetable file.");
            }
        };
        reader.readAsText(file);
        // reset input so the same file can be loaded again if needed
        event.target.value = ""; 
    }

    // Initial render
    renderTable();
</script>

</body>
</html>
