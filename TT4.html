<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Timetable Manager</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            background: var(--surface);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        h2 { margin: 0; color: var(--primary); font-size: 1.5rem; }

        /* Controls Section */
        .controls-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 25px;
        }

        .controls-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        select, input[type="text"] {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            transition: border-color 0.2s;
            min-width: 180px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
            ring: 2px solid var(--primary);
        }

        /* Buttons */
        button {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }

        .btn-secondary { background: var(--secondary); color: white; }
        .btn-secondary:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-danger { background: var(--danger); color: white; }

        /* Table Responsiveness */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            min-width: 800px; /* Forces scroll on small screens */
        }

        th, td {
            border: 1px solid var(--border);
            padding: 16px;
            text-align: center;
        }

        th {
            background-color: #f1f5f9;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        td {
            height: 100px;
            vertical-align: top;
            transition: background 0.2s;
        }

        td:hover { background-color: #f8fafc; cursor: pointer; }

        .cell-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            gap: 4px;
        }

        .subject { font-weight: 700; color: var(--primary); font-size: 0.95rem; }
        .faculty { font-size: 0.8rem; color: var(--text-muted); }
        .add-placeholder { color: #cbd5e1; font-size: 0.8rem; font-style: italic; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content h3 { margin-top: 0; margin-bottom: 20px; }
        .modal-inputs { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .modal-actions { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 10px; }

        /* Mobile specific adjustments */
        @media (max-width: 640px) {
            header { flex-direction: column; text-align: center; }
            .controls-row { justify-content: center; }
            .modal-actions button { width: 100%; }
        }

        @media print {
            .controls-wrapper, button, header { display: none !important; }
            .container { box-shadow: none; padding: 0; }
            table { border: 2px solid black; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>🗓️ Timetable Manager</h2>
        <div class="controls-row">
            <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">📁 Load JSON</button>
            <input type="file" id="fileInput" style="display: none" accept=".json" onchange="loadFile(event)">
            <button class="btn-secondary" onclick="saveFile()">💾 Save File</button>
            <button class="btn-primary" style="background: #334155" onclick="window.print()">🖨️ Print PDF</button>
        </div>
    </header>

    <div class="controls-wrapper">
        <div class="controls-row">
            <label>Department
                <select id="department" onchange="renderTable()">
                    <option value="Computer Science">Computer Science</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Electrical">Electrical</option>
                    <option value="Civil">Civil</option>
                </select>
            </label>
            
            <label>Semester
                <select id="semester" onchange="renderTable()">
                    <option value="1">Semester 1</option>
                    <option value="2">Semester 2</option>
                    <option value="3">Semester 3</option>
                    <option value="4">Semester 4</option>
                    <option value="5">Semester 5</option>
                    <option value="6">Semester 6</option>
                </select>
            </label>

            <button class="btn-primary" onclick="addTimeSlot()" style="margin-top: auto;">+ Add Time Slot</button>
        </div>
    </div>

    <div class="table-container">
        <table id="timetable">
            <thead>
                <tr id="header-row">
                    <th>Day / Time</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h3>Edit Lecture</h3>
        <div class="modal-inputs">
            <input type="text" id="subjectInput" placeholder="Subject (e.g. Data Structures)">
            <input type="text" id="facultyInput" placeholder="Faculty (e.g. Prof. Smith)">
        </div>
        <div class="modal-actions">
            <button class="btn-danger" onclick="clearCell()">Clear</button>
            <div style="display:flex; gap: 8px;">
                <button style="background: #e2e8f0; color: #475569" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="saveCell()">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    let appData = {};
    let currentEditParams = null;

    function getCurrentKey() {
        const dept = document.getElementById('department').value;
        const sem = document.getElementById('semester').value;
        return `${dept}_Sem${sem}`;
    }

    function initDataIfMissing(key) {
        if (!appData[key]) {
            appData[key] = {
                timeSlots: ["09:00 AM - 10:00 AM", "10:00 AM - 11:00 AM"],
                schedule: {}
            };
            days.forEach(day => { appData[key].schedule[day] = {}; });
        }
    }

    function renderTable() {
        const key = getCurrentKey();
        initDataIfMissing(key);
        const data = appData[key];

        const headerRow = document.getElementById('header-row');
        headerRow.innerHTML = '<th>Day / Time</th>';
        data.timeSlots.forEach((slot, index) => {
            const th = document.createElement('th');
            th.innerText = slot;
            th.ondblclick = () => removeTimeSlot(index);
            th.title = "Double click to remove";
            headerRow.appendChild(th);
        });

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        
        days.forEach(day => {
            const tr = document.createElement('tr');
            const dayCell = document.createElement('td');
            dayCell.style.fontWeight = "bold";
            dayCell.style.backgroundColor = "#f8fafc";
            dayCell.innerText = day;
            tr.appendChild(dayCell);

            data.timeSlots.forEach((slot, index) => {
                const td = document.createElement('td');
                const cellData = data.schedule[day][index];
                
                if (cellData && cellData.subject) {
                    td.innerHTML = `
                        <div class="cell-content">
                            <span class="subject">${cellData.subject}</span>
                            <span class="faculty">${cellData.faculty}</span>
                        </div>
                    `;
                } else {
                    td.innerHTML = `<span class="add-placeholder">+ Add Lecture</span>`;
                }
                
                td.onclick = () => openModal(day, index);
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    }

    function addTimeSlot() {
        const newSlot = prompt("Enter time slot (e.g., 11:00 AM - 12:00 PM):");
        if (newSlot && newSlot.trim() !== "") {
            const key = getCurrentKey();
            appData[key].timeSlots.push(newSlot);
            renderTable();
        }
    }

    function removeTimeSlot(index) {
        if (confirm("Delete this column? This will clear all lectures in this slot.")) {
            const key = getCurrentKey();
            appData[key].timeSlots.splice(index, 1);
            days.forEach(day => {
                const newDaySchedule = {};
                let newIndex = 0;
                for (let i = 0; i <= appData[key].timeSlots.length; i++) {
                    if (i !== index && appData[key].schedule[day][i]) {
                        newDaySchedule[newIndex] = appData[key].schedule[day][i];
                        newIndex++;
                    } else if (i !== index) { newIndex++; }
                }
                appData[key].schedule[day] = newDaySchedule;
            });
            renderTable();
        }
    }

    function openModal(day, slotIndex) {
        currentEditParams = { day, slotIndex };
        const key = getCurrentKey();
        const cellData = appData[key].schedule[day][slotIndex] || { subject: "", faculty: "" };
        document.getElementById('subjectInput').value = cellData.subject;
        document.getElementById('facultyInput').value = cellData.faculty;
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
        currentEditParams = null;
    }

    function saveCell() {
        const subject = document.getElementById('subjectInput').value;
        const faculty = document.getElementById('facultyInput').value;
        const key = getCurrentKey();
        appData[key].schedule[currentEditParams.day][currentEditParams.slotIndex] = { subject, faculty };
        closeModal();
        renderTable();
    }

    function clearCell() {
        const key = getCurrentKey();
        delete appData[key].schedule[currentEditParams.day][currentEditParams.slotIndex];
        closeModal();
        renderTable();
    }

    function saveFile() {
        const dataStr = JSON.stringify(appData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "college_timetables.json";
        a.click();
    }

    function loadFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                appData = JSON.parse(e.target.result);
                renderTable();
            } catch (error) { alert("Invalid JSON file."); }
        };
        reader.readAsText(file);
        event.target.value = ""; 
    }

    renderTable();
</script>

</body>
</html>
